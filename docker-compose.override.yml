# 로컬 개발 전용 오버라이드 — docker compose up 시 자동 적용
# 운영 배포에서는 사용하지 않음
services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: fridgechef-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

  backend:
    depends_on:
      - mailpit
    environment:
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_USER: ""
      SMTP_PASSWORD: ""
