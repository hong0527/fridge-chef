name: CI

on:
  push:
    branches: [main, dev, "feat/**", "fix/**"]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        env:
          # 32자+ (security.py 부팅 가드 충족). 운영 사용 금지 — CI 전용 상수.
          JWT_SECRET: ci-test-secret-do-not-use-in-prod-padding-1234567890abcdef
          GEMINI_API_KEY: ""
        run: pytest -q

  frontend:
    name: Frontend (typecheck + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint --if-present
